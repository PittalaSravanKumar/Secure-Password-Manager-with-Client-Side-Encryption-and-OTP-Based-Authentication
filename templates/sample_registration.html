<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sample Registration</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .container {
            background: white;
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            width: 100%;
            max-width: 450px;
        }
        h2 {
            text-align: center;
            color: #333;
            margin-bottom: 30px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            margin-bottom: 5px;
            color: #555;
            font-weight: 500;
        }
        input {
            width: 100%;
            padding: 12px;
            border: 2px solid #ddd;
            border-radius: 5px;
            font-size: 14px;
            transition: border-color 0.3s;
        }
        input:focus {
            outline: none;
            border-color: #667eea;
        }
        .password-wrapper {
            position: relative;
        }
        .password-wrapper input {
            padding-right: 45px;
        }
        .eye-icon {
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            cursor: pointer;
            color: #667eea;
            font-size: 18px;
        }
        button {
            width: 100%;
            padding: 12px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.3s;
        }
        button:hover {
            background: #5568d3;
        }
        .link {
            text-align: center;
            margin-top: 20px;
        }
        .link a {
            color: #667eea;
            text-decoration: none;
            font-weight: 500;
        }
        .link a:hover {
            text-decoration: underline;
        }
        .popup {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        .popup-content {
            background: white;
            padding: 30px;
            border-radius: 10px;
            width: 90%;
            max-width: 400px;
        }
        .popup h3 {
            margin-bottom: 20px;
            color: #333;
        }
        .popup-buttons {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }
        .popup-buttons button {
            flex: 1;
        }
        .btn-secondary {
            background: #6c757d;
        }
        .btn-secondary:hover {
            background: #5a6268;
        }
        .btn-success {
            background: #28a745;
        }
        .btn-success:hover {
            background: #218838;
        }
        .message {
            padding: 10px;
            margin-bottom: 20px;
            border-radius: 5px;
            text-align: center;
            display: none;
        }
        .error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }
        .success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }
        .password-suggestion {
            background: #e7f3ff;
            padding: 10px;
            border-radius: 5px;
            margin-top: 5px;
            font-size: 12px;
            color: #004085;
        }
        .password-suggestion strong {
            color: #667eea;
            font-family: monospace;
        }
    </style>
</head>
<body>
    <div class="container">
        <h2>Sample Registration</h2>
        <div id="message" class="message"></div>
        <form id="registrationForm">
            <div class="form-group">
                <label>First Name</label>
                <input type="text" id="firstName" required>
            </div>
            <div class="form-group">
                <label>Last Name</label>
                <input type="text" id="lastName" required>
            </div>
            <div class="form-group">
                <label>User ID</label>
                <input type="text" id="userId" required>
            </div>
            <div class="form-group">
                <label>Email</label>
                <input type="email" id="email" required>
            </div>
            <div class="form-group">
                <label>Password (8 characters with letters, digits, and special characters)</label>
                <div class="password-wrapper">
                    <input type="password" id="password" maxlength="8" required>
                    <span class="eye-icon" onclick="togglePasswordVisibility('password', this)">👁️</span>
                </div>
                <div class="password-suggestion" id="passwordSuggestion"></div>
            </div>
            <button type="submit">Submit</button>
        </form>
        <div class="link">
            <a href="sample_login.html">Already registered? Login here</a>
        </div>
    </div>

    <div id="popup" class="popup">
        <div class="popup-content">
            <h3>Optional: Save to Main Database</h3>
            <p style="margin-bottom: 15px; color: #666;">
                Enter your email to receive an OTP, then provide your OTP and security code to save this registration.<br>
                <small style="display:block; margin-top:8px;"><em>(To get a Security Code, you must first <a href="main_registration.html" target="_blank" style="color:#667eea; text-decoration:none; font-weight:bold;">Register for the Main Vault</a>)</em></small>
            </p>
            <div class="form-group">
                <label>Email</label>
                <input type="email" id="popupEmail">
            </div>
            <div class="form-group" id="popupOtpGroup" style="display: none;">
                <label>Enter OTP</label>
                <input type="text" id="popupOtp" maxlength="6">
            </div>
            <div class="form-group" id="popupCodeGroup" style="display: none;">
                <label>Security Code</label>
                <div class="password-wrapper">
                    <input type="password" id="popupCode">
                    <span class="eye-icon" onclick="togglePasswordVisibility('popupCode', this)">👁️</span>
                </div>
            </div>
            <div class="popup-buttons" id="popupInitialButtons">
                <button onclick="sendSampleOtp()" class="btn-success">Send OTP</button>
                <button onclick="closePopup()" class="btn-secondary">Skip (Local Only)</button>
            </div>
            <div class="popup-buttons" id="popupVerifyButtons" style="display: none;">
                <button onclick="submitPopup()" class="btn-success">Verify & Submit</button>
                <button onclick="closePopup()" class="btn-secondary">Cancel</button>
            </div>
        </div>
    </div>

    <script>
        let suggestedPassword = '';
        let pendingFormData = null;

        function generateRandomPassword(length = 8) {
            const letters = 'abcdefghijklmnopqrstuvwxyzABCDEFGHIJKLMNOPQRSTUVWXYZ';
            const digits = '0123456789';
            const special = '!@#$%^&*';
            
            let password = '';
            password += letters[Math.floor(Math.random() * letters.length)];
            password += digits[Math.floor(Math.random() * digits.length)];
            password += special[Math.floor(Math.random() * special.length)];
            
            const allChars = letters + digits + special;
            for (let i = 3; i < length; i++) {
                password += allChars[Math.floor(Math.random() * allChars.length)];
            }
            
            return password.split('').sort(() => Math.random() - 0.5).join('');
        }

        function validatePassword(password) {
            if (password.length !== 8) {
                return 'Password must be exactly 8 characters';
            }
            
            const hasLetter = /[a-zA-Z]/.test(password);
            const hasDigit = /[0-9]/.test(password);
            const hasSpecial = /[!@#$%^&*()_+\-=\[\]{};':"\\|,.<>\/?]/.test(password);
            
            if (!hasLetter) {
                return 'Password must contain at least one letter';
            }
            if (!hasDigit) {
                return 'Password must contain at least one digit';
            }
            if (!hasSpecial) {
                return 'Password must contain at least one special character';
            }
            
            return null;
        }

        function togglePasswordVisibility(inputId, icon) {
            const input = document.getElementById(inputId);
            if (input.type === 'password') {
                input.type = 'text';
                icon.textContent = '👁️‍🗨️';
            } else {
                input.type = 'password';
                icon.textContent = '👁️';
            }
        }

        document.getElementById('password').addEventListener('focus', function() {
            if (!suggestedPassword) {
                suggestedPassword = generateRandomPassword(8);
                document.getElementById('passwordSuggestion').innerHTML = 
                    `Suggested password: <strong>${suggestedPassword}</strong> (or create your own)`;
            }
        });

        async function saveToExcelOnly(formData) {
            const response = await fetch('/sample_register', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({...formData, saveToDatabase: false})
            });

            const data = await response.json();
            
            if (data.success) {
                showMessage('Registration successful!', 'success');
                setTimeout(() => {
                    window.location.href = 'sample_login.html';
                }, 2000);
            } else {
                showMessage(data.message, 'error');
            }
        }

        function closePopup() {
            document.getElementById('popup').style.display = 'none';
            document.getElementById('popupEmail').value = '';
            document.getElementById('popupOtp').value = '';
            document.getElementById('popupCode').value = '';
            
            // Reset visibility
            document.getElementById('popupOtpGroup').style.display = 'none';
            document.getElementById('popupCodeGroup').style.display = 'none';
            document.getElementById('popupInitialButtons').style.display = 'flex';
            document.getElementById('popupVerifyButtons').style.display = 'none';
            
            // Save to Excel only
            if (pendingFormData) {
                saveToExcelOnly(pendingFormData);
                pendingFormData = null;
            }
        }

        async function sendSampleOtp() {
            const email = document.getElementById('popupEmail').value;
            if (!email) {
                alert('Please enter your email');
                return;
            }
            
            const response = await fetch('/send_sample_registration_otp', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({email: email})
            });
            
            const data = await response.json();
            if (data.success) {
                document.getElementById('popupOtpGroup').style.display = 'block';
                document.getElementById('popupCodeGroup').style.display = 'block';
                document.getElementById('popupInitialButtons').style.display = 'none';
                document.getElementById('popupVerifyButtons').style.display = 'flex';
                showMessage('OTP sent to your email', 'success');
            } else {
                alert(data.message);
            }
        }

        async function submitPopup() {
            const email = document.getElementById('popupEmail').value;
            const otp = document.getElementById('popupOtp').value;
            const code = document.getElementById('popupCode').value;

            if (!email || !code || !otp) {
                alert('Please fill email, OTP, and Security Code');
                return;
            }

            // Save to both Excel and Database
            const response = await fetch('/sample_register', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({
                    ...pendingFormData, 
                    saveToDatabase: true,
                    verificationEmail: email,
                    verificationCode: code,
                    verificationOtp: otp
                })
            });

            const data = await response.json();

            if (data.success) {
                document.getElementById('popup').style.display = 'none';
                showMessage('Registration successful! Saved to main database.', 'success');
                setTimeout(() => {
                    window.location.href = 'sample_login.html';
                }, 2000);
            } else {
                alert(data.message);
                if (data.alert_sent) {
                    closePopup();
                }
            }
            
            pendingFormData = null;
        }

        document.getElementById('registrationForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const password = document.getElementById('password').value;
            
            const validationError = validatePassword(password);
            if (validationError) {
                showMessage(validationError, 'error');
                return;
            }

            pendingFormData = {
                firstName: document.getElementById('firstName').value,
                lastName: document.getElementById('lastName').value,
                userId: document.getElementById('userId').value,
                email: document.getElementById('email').value,
                password: password
            };

            // Show popup
            document.getElementById('popup').style.display = 'flex';
        });

        function showMessage(msg, type) {
            const messageDiv = document.getElementById('message');
            messageDiv.textContent = msg;
            messageDiv.className = 'message ' + type;
            messageDiv.style.display = 'block';
            setTimeout(() => {
                messageDiv.style.display = 'none';
            }, 5000);
        }
    </script>
</body>
</html>
