<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Main Registration</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .container {
            background: white;
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            width: 100%;
            max-width: 450px;
        }
        h2 {
            text-align: center;
            color: #333;
            margin-bottom: 30px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            margin-bottom: 5px;
            color: #555;
            font-weight: 500;
        }
        input {
            width: 100%;
            padding: 12px;
            border: 2px solid #ddd;
            border-radius: 5px;
            font-size: 14px;
            transition: border-color 0.3s;
        }
        input:focus {
            outline: none;
            border-color: #667eea;
        }
        button {
            width: 100%;
            padding: 12px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.3s;
        }
        button:hover {
            background: #5568d3;
        }
        .message {
            padding: 10px;
            margin-bottom: 20px;
            border-radius: 5px;
            text-align: center;
            display: none;
        }
        .error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }
        .success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }
        .popup {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        .popup-content {
            background: white;
            padding: 30px;
            border-radius: 10px;
            width: 90%;
            max-width: 400px;
            text-align: center;
        }
        .popup h3 {
            margin-bottom: 20px;
            color: #333;
        }
        .code-display {
            font-size: 32px;
            font-weight: bold;
            color: #667eea;
            padding: 20px;
            background: #f8f9fa;
            border-radius: 5px;
            margin: 20px 0;
            letter-spacing: 3px;
        }
        .timer {
            color: #dc3545;
            font-weight: bold;
            margin-top: 10px;
        }
        #otpSection {
            display: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <h2>Main Registration</h2>
        <div id="message" class="message"></div>
        <form id="registrationForm">
            <div class="form-group">
                <label>Email</label>
                <input type="email" id="email" required>
            </div>
            <div class="form-group">
                <label>Name</label>
                <input type="text" id="name" required>
            </div>
            <button type="submit">Submit</button>
        </form>

        <div id="otpSection">
            <div class="form-group">
                <label>Enter OTP</label>
                <input type="text" id="otp" maxlength="6" required>
            </div>
            <button onclick="verifyOTP()">Verify OTP</button>
        </div>
    </div>

    <div id="codePopup" class="popup">
        <div class="popup-content">
            <h3>Your Security Code</h3>
            <p>Save this code securely. You will need it to autofill passwords.</p>
            <div class="code-display" id="codeDisplay"></div>
            <div class="timer">This popup will close in <span id="countdown">10</span> seconds</div>
        </div>
    </div>

    <script>
        let generatedOTP = '';
        let userEmail = '';

        document.getElementById('registrationForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            userEmail = document.getElementById('email').value.trim().toLowerCase();  // normalize: must match login's lowercase
            const name = document.getElementById('name').value;

            const response = await fetch('/send_registration_otp', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({email: userEmail, name: name})
            });

            const data = await response.json();
            
            if (data.success) {
                generatedOTP = data.otp;
                showMessage('OTP sent to your email', 'success');
                document.getElementById('otpSection').style.display = 'block';
            } else {
                showMessage('Failed to send OTP', 'error');
            }
        });

        async function verifyOTP() {
            const enteredOTP = document.getElementById('otp').value;

            if (enteredOTP !== generatedOTP) {
                showMessage('Invalid OTP', 'error');
                return;
            }

            const response = await fetch('/complete_registration', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({
                    email: userEmail,
                    name: document.getElementById('name').value
                })
            });

            const data = await response.json();

            if (data.success) {
                showMessage('Registration successful!', 'success');
                displayCode(data.code);
            } else {
                showMessage(data.message, 'error');
            }
        }

        function displayCode(code) {
            document.getElementById('codeDisplay').textContent = code;
            document.getElementById('codePopup').style.display = 'flex';
            
            let seconds = 10;
            const countdown = setInterval(() => {
                seconds--;
                document.getElementById('countdown').textContent = seconds;
                if (seconds <= 0) {
                    clearInterval(countdown);
                    document.getElementById('codePopup').style.display = 'none';
                    window.location.href = 'sample_login.html';
                }
            }, 1000);
        }

        function showMessage(msg, type) {
            const messageDiv = document.getElementById('message');
            messageDiv.textContent = msg;
            messageDiv.className = 'message ' + type;
            messageDiv.style.display = 'block';
            setTimeout(() => {
                messageDiv.style.display = 'none';
            }, 5000);
        }
    </script>
</body>
</html>
